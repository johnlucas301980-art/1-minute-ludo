name: one_minute_ludo
description: "1 Minute Ludo — Production Flutter Application. Target platform: Android."
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Realtime communication with the backend
  socket_io_client: ^2.0.3+1

  # HTTP client for REST API calls
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
